name: artifact
on: push

jobs:
  job1:
    runs-on: ubuntu-latest
    steps:
      - name: create a file
        run: echo "hello world" > file.txt
      
      - name: upload on artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-file
          path: file.txt
  
  job2:
    runs-on: ubuntu-latest
    steps: 
      - name: download a file
        uses: actions/download-artifact@v4
        with:
          name: my-file
      
      - name: read a file
        uses: cat file.txt